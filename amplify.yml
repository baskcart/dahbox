version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Diagnostic — prints YES/NO in the Amplify build log (never prints the value)
        - echo "=== ENV DIAGNOSTIC ==="
        - "[ -n \"$FOOTBALL_API_KEY\" ] && echo 'FOOTBALL_API_KEY: SET' || echo 'FOOTBALL_API_KEY: MISSING'"
        - "[ -n \"$CUSTOM_AWS_ACCESS_KEY_ID\" ] && echo 'CUSTOM_AWS_ACCESS_KEY_ID: SET' || echo 'CUSTOM_AWS_ACCESS_KEY_ID: MISSING'"
        - echo "=== END DIAGNOSTIC ==="
        # Bake server-side env vars into .env.production.local for Lambda bundle
        - echo "CUSTOM_AWS_ACCESS_KEY_ID=$CUSTOM_AWS_ACCESS_KEY_ID" >> .env.production.local
        - echo "CUSTOM_AWS_SECRET_ACCESS_KEY=$CUSTOM_AWS_SECRET_ACCESS_KEY" >> .env.production.local
        - echo "DAHBOX_STAKES_TABLE=${DAHBOX_STAKES_TABLE:-DAHBOX_STAKES}" >> .env.production.local
        - echo "ROLLEDGE_API_URL=$ROLLEDGE_API_URL" >> .env.production.local
        - echo "FOOTBALL_API_KEY=$FOOTBALL_API_KEY" >> .env.production.local
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
